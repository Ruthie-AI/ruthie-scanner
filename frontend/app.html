<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meme Scanner</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
  <!-- Styles -->
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/modal.css" />
  <link rel="stylesheet" href="css/skins/themes.css" />
  <link rel="stylesheet" href="css/skins/scanner.css" />
</head>
<body data-skin="scanner">
  <!-- ── Header ─────────────────────────────────────────────────────────────── -->
  <header class="app-header">
    <div class="header-left">
      <span class="logo">Meme Scanner</span>
      <span class="chain-badge">Solana</span>
    </div>
    <div class="header-center">
      <div class="header-status-group">
        <span id="status-indicator" class="status-indicator status-state-connecting"></span>
        <span id="status-text" class="status-text">Waking up...</span>
      </div>
    </div>
    <div class="header-right">
      <span id="birdeye-health" class="birdeye-health" hidden></span>
      <span id="birdeye-reset" class="birdeye-reset" hidden></span>
      <div class="header-prices" id="header-prices">
        <div class="header-price">
          <img class="header-price-icon hp-sol" src="assets/crypto/solana.png" alt="SOL" />
          <span class="header-price-val" data-coin="sol">--</span>
          <span class="header-price-chg" data-coin-chg="sol"></span>
        </div>
        <div class="header-price">
          <img class="header-price-icon hp-btc" src="assets/crypto/bitcoin.png" alt="BTC" />
          <span class="header-price-val" data-coin="btc">--</span>
          <span class="header-price-chg" data-coin-chg="btc"></span>
        </div>
        <div class="header-price">
          <img class="header-price-icon hp-eth" src="assets/crypto/ethereum.png" alt="ETH" />
          <span class="header-price-val" data-coin="eth">--</span>
          <span class="header-price-chg" data-coin-chg="eth"></span>
        </div>
      </div>
    </div>
  </header>

  <!-- ── App layout ─────────────────────────────────────────────────────────── -->
  <div class="app-layout">
    <!-- Sidebar filters (desktop only) -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="sidebar-mood" id="sidebar-mood">
          <span class="sidebar-mood-emoji" id="sidebar-mood-emoji">--</span>
          <div class="sidebar-brand-info">
            <span class="sidebar-brand-name" id="sidebar-mood-label">Market Mood</span>
            <span class="sidebar-brand-status" id="sidebar-status">Scanning...</span>
          </div>
        </div>
      </div>
      <h3 class="sidebar-title">Filters</h3>

      <div class="filter-group">
        <input type="search" id="filter-search" class="filter-search" placeholder="Search token or CA..." autocomplete="off" />
      </div>

      <div class="filter-group">
        <label class="filter-label" for="filter-min-score">Min Score</label>
        <input type="range" id="filter-min-score" min="0" max="100" value="0" class="filter-range" />
        <span id="filter-min-score-val" class="filter-value">0</span>
      </div>

      <div class="filter-group">
        <div class="filter-label-row">
          <label class="filter-label">Category</label>
          <label class="select-all-label"><input type="checkbox" id="filter-cat-all" checked /> All</label>
        </div>
        <div class="checkbox-group">
          <label><input type="checkbox" class="filter-cat" value="STRONG_BUY" checked /> Strong Buy</label>
          <label><input type="checkbox" class="filter-cat" value="EXHAUSTED" checked /> Exhausted</label>
          <label><input type="checkbox" class="filter-cat" value="BUY" checked /> Buy</label>
          <label><input type="checkbox" class="filter-cat" value="WATCH" checked /> Watch</label>
          <label><input type="checkbox" class="filter-cat" value="NEUTRAL" checked /> Neutral</label>
          <label><input type="checkbox" class="filter-cat" value="AVOID" checked /> Avoid</label>
          <label><input type="checkbox" class="filter-cat" value="WATCHLIST" checked /> Watchlist</label>
        </div>
      </div>

      <div class="filter-group">
        <label class="filter-label" for="filter-sort">Sort By</label>
        <select id="filter-sort" class="filter-select">
          <option value="score">Score (High &rarr; Low)</option>
          <option value="trending">Trending Rank</option>
          <option value="age">Token Age</option>
          <option value="marketCap">Market Cap</option>
        </select>
      </div>

      <button id="btn-notify" class="btn-notify">Enable Alerts</button>

      <div class="sidebar-stats">
        <div class="stat-row"><span>Tracked</span><span id="stat-tracked">0</span></div>
        <div class="stat-row"><span>Last Scan</span><span id="stat-last-scan">--</span></div>
      </div>
    </aside>

    <!-- Main content area -->
    <div id="main">
      <!-- Filter bar (Scanner skin — horizontal strip) -->
      <div class="filter-bar" id="filter-bar">
        <button class="filter-bar-toggle" id="fb-toggle">Filters</button>
        <div class="filter-bar-controls" id="fb-controls">
          <input type="search" class="fb-search" id="fb-search" placeholder="Search token or CA..." autocomplete="off" />
          <div class="fb-score-group">
            <span class="fb-score-label">Min</span>
            <input type="range" class="fb-score-range" id="fb-score" min="0" max="100" value="0" />
            <span class="fb-score-val" id="fb-score-val">0</span>
          </div>
          <div class="fb-cats" id="fb-cats">
            <button class="fb-cat-pill active" data-cat="STRONG_BUY">Strong</button>
            <button class="fb-cat-pill active" data-cat="EXHAUSTED">Done</button>
            <button class="fb-cat-pill active" data-cat="BUY">Buy</button>
            <button class="fb-cat-pill active" data-cat="WATCH">Watch</button>
            <button class="fb-cat-pill active" data-cat="NEUTRAL">Neutral</button>
            <button class="fb-cat-pill active" data-cat="AVOID">Avoid</button>
            <button class="fb-cat-pill active" data-cat="WATCHLIST">WL</button>
          </div>
          <select class="fb-sort" id="fb-sort">
            <option value="score">Score</option>
            <option value="trending">Trending</option>
            <option value="age">Age</option>
            <option value="marketCap">MCap</option>
          </select>
        </div>
      </div>

      <!-- Tab bar (scanner only) -->
      <div id="tab-bar">
        <button class="tab-btn active" data-tab="tracker">Scanner <span class="tab-count" id="tab-count-scanner"></span></button>
      </div>

      <!-- Tracker panel -->
      <div id="tracker-panel">
        <div id="tracker-chart-zone" hidden></div>
        <main class="token-grid" id="token-grid">
          <div class="card-skeleton"></div>
          <div class="card-skeleton"></div>
          <div class="card-skeleton"></div>
          <div class="card-skeleton"></div>
          <div class="card-skeleton"></div>
          <div class="card-skeleton"></div>
          <div class="empty-state" id="empty-state">
            <p>Scanning for tokens...</p>
            <p class="empty-sub">Give me 15 seconds</p>
          </div>
        </main>
      </div>
    </div>
  </div>

  <!-- ── Bottom nav (mobile) ────────────────────────────────────────────────── -->
  <nav class="bottom-nav">
    <button class="bottom-nav-btn active" data-tab="tracker">
      <span class="bottom-nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4"/><path d="M12 3v2M12 19v2M3 12h2M19 12h2"/></svg></span>
      <span class="bottom-nav-label">Scanner</span>
    </button>
  </nav>

  <!-- ── Toast container ────────────────────────────────────────────────────── -->
  <div id="toast-container" class="toast-container"></div>

  <!-- ── JS modules ─────────────────────────────────────────────────────────── -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
